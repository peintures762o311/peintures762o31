style="margin-top:30px;width:100px;height:100px;object-fit:contain;cursor:pointer;">

<!-- VIDEO ADDED HERE -->
<video controls>
  <source src="peintures762o31.mp4" type="video/mp4">
  Your browser does not support video playback.
</video>

<audio id="player"></audio>

<script>
const audioFileURL = "xact prod. cavitnak & laura.wav";
const audio = document.getElementById('player');
const btn = document.getElementById('playBtn');
let isPlaying = false;

audio.src = audioFileURL;

btn.addEventListener('click', () => {
  if (isPlaying) {
    audio.pause();
    btn.innerHTML = '&#9654;&#65039;';
    isPlaying = false;
  } else {
    audio.play();
    btn.innerHTML = '&#9208;&#65039;';
    isPlaying = true;
  }
});

audio.addEventListener('ended', () => {
  btn.innerHTML = '&#9654;&#65039;';
  isPlaying = false;
});
</script>

</body>
